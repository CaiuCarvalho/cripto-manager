# HTTP -> HTTPS redirect (producao)
server {
    listen 80;
    server_name agonimports.com www.agonimports.com;
    return 301 https://agonimports.com$request_uri;
}

# HTTP -> HTTPS redirect (staging)
server {
    listen 80;
    server_name staging.agonimports.com;
    return 301 https://staging.agonimports.com$request_uri;
}

# PRODUCAO
server {
    listen 443 ssl;
    server_name agonimports.com www.agonimports.com;

    ssl_certificate     /etc/letsencrypt/live/agonimports.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agonimports.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    if ($host = www.agonimports.com) {
        return 301 https://agonimports.com$request_uri;
    }

    location /_next/static/ {
        proxy_pass http://localhost:30000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 60m;
        add_header Cache-Control "public, max-age=3600, immutable";
    }

    location /api/ {
        proxy_pass http://localhost:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://localhost:30000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    access_log /var/log/nginx/agon-prod-access.log;
    error_log  /var/log/nginx/agon-prod-error.log;
}

# STAGING
server {
    listen 443 ssl;
    server_name staging.agonimports.com;

    ssl_certificate     /etc/letsencrypt/live/staging.agonimports.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.agonimports.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Robots-Tag "noindex, nofollow" always;

    location /_next/static/ {
        proxy_pass http://localhost:30001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 60m;
        add_header Cache-Control "public, max-age=3600, immutable";
    }

    location / {
        proxy_pass http://localhost:30001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    access_log /var/log/nginx/agon-staging-access.log;
    error_log  /var/log/nginx/agon-staging-error.log;
}
